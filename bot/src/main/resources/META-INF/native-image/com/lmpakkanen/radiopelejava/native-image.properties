# GraalVM Native Image Configuration for Radio Pele Bot

# Initialization at build time - these are safe and improve performance
Args = --initialize-at-build-time=org.springframework
Args = --initialize-at-build-time=org.apache.commons.logging
Args = --initialize-at-build-time=org.apache.commons.logging.LogAdapter
Args = --initialize-at-build-time=org.apache.commons.logging.LogAdapter$Slf4jLocationAwareLog
Args = --initialize-at-build-time=ch.qos.logback
Args = --initialize-at-build-time=org.slf4j
Args = --initialize-at-build-time=org.springframework.boot.json.JacksonJsonParser$MapTypeReference

# Initialization at run time
Args = --initialize-at-run-time=io.netty
Args = --initialize-at-run-time=com.sun.jna
Args = --initialize-at-run-time=net.java.dev.jna
Args = --initialize-at-run-time=org.springframework.core.io.VfsUtils

# Enable JNI for native libraries (Opus for audio)
Args = -H:+JNI

# Resources to include in native image
Args = -H:+UnlockExperimentalVMOptions
Args = -H:IncludeResources=application.yml|application-prod.yml

Args = --trace-object-instantiation=org.springframework.boot.json.GsonJsonParser$MapTypeToken